version: "3.9"

services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      IDS_JWT_SECRET: super-secret-change-me
    volumes:
      - .:/app

  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      IDS_JWT_SECRET: super-secret-change-me
    volumes:
      - .:/app
    depends_on:
      - api

